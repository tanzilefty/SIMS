<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Student Information System</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="login-container">
    <div class="card">
      <h1 class="main-title">🔐 Welcome Back</h1>
      <p class="login-subtitle">Sign in to access your dashboard</p>

      <div id="errorMessage" class="error-message"></div>

      <form id="loginForm">
        <div class="form-group">
          <label for="role" id="usernameLabel">Role</label>
          <select id="role" required>
            <option value="admin">Admin</option>
            <option value="student">Student</option>
          </select>
        </div>

        <div class="form-group">
          <label for="username">Username / Student ID</label>
          <input type="text" id="username" required>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password">
        </div>

        <button type="submit" class="btn">Login</button>
      </form>

      <div style="margin-top: 1rem; text-align: center; font-size: 0.85rem; color: #6b7280;">
        <strong>Demo:</strong> Admin: admin / 123 | Student: any ID
      </div>
      <div style="margin-top: 0.5rem; text-align: center;">
        <a href="index.html" style="color: #4f46e5;">← Back to Home</a>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
